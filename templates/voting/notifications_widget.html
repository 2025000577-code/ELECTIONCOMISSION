<!-- Notification Bell Widget -->
<div class="notification-widget">
    <div class="dropdown">
        <button class="btn btn-link position-relative" type="button" id="notificationDropdown" 
                data-bs-toggle="dropdown" aria-expanded="false">
            <i class="fas fa-bell fa-lg text-white"></i>
            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" 
                  id="notificationCount" style="display: none;">
                0
            </span>
        </button>
        <ul class="dropdown-menu dropdown-menu-end notification-dropdown" 
            aria-labelledby="notificationDropdown" style="width: 350px; max-height: 500px; overflow-y: auto;">
            <li class="dropdown-header d-flex justify-content-between align-items-center">
                <span><i class="fas fa-bell me-2"></i>Notifications</span>
                <button class="btn btn-sm btn-link text-primary" onclick="markAllAsRead()">
                    Mark all read
                </button>
            </li>
            <li><hr class="dropdown-divider"></li>
            <div id="notificationList">
                <li class="text-center py-3 text-muted">
                    <i class="fas fa-inbox fa-2x mb-2"></i>
                    <p class="mb-0">No notifications</p>
                </li>
            </div>
        </ul>
    </div>
</div>

<style>
.notification-widget {
    position: relative;
}

.notification-dropdown {
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    border: none;
    border-radius: 10px;
}

.notification-item {
    padding: 15px;
    border-bottom: 1px solid #f0f0f0;
    transition: background 0.3s;
    cursor: pointer;
}

.notification-item:hover {
    background: #f8f9fa;
}

.notification-item.unread {
    background: #e3f2fd;
}

.notification-icon {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    margin-right: 12px;
}

.notification-icon.info { background: #2196F3; color: white; }
.notification-icon.success { background: #4CAF50; color: white; }
.notification-icon.warning { background: #FF9800; color: white; }
.notification-icon.error { background: #F44336; color: white; }

.notification-title {
    font-weight: 600;
    font-size: 0.95rem;
    margin-bottom: 5px;
}

.notification-message {
    font-size: 0.85rem;
    color: #666;
    margin-bottom: 5px;
}

.notification-time {
    font-size: 0.75rem;
    color: #999;
}

@keyframes bellRing {
    0%, 100% { transform: rotate(0deg); }
    10%, 30% { transform: rotate(-10deg); }
    20%, 40% { transform: rotate(10deg); }
}

.bell-ring {
    animation: bellRing 0.5s ease-in-out;
}
</style>

<script>
let lastNotificationCount = 0;

// Fetch notifications
async function fetchNotifications() {
    try {
        const response = await fetch('/api/notifications/');
        const data = await response.json();
        updateNotificationUI(data.notifications, data.unread_count);
    } catch (error) {
        console.error('Error fetching notifications:', error);
    }
}

// Update notification UI
function updateNotificationUI(notifications, unreadCount) {
    const countBadge = document.getElementById('notificationCount');
    const notificationList = document.getElementById('notificationList');
    
    // Update count badge
    if (unreadCount > 0) {
        countBadge.textContent = unreadCount > 99 ? '99+' : unreadCount;
        countBadge.style.display = 'block';
        
        // Ring bell if new notification
        if (unreadCount > lastNotificationCount) {
            document.querySelector('.fa-bell').classList.add('bell-ring');
            setTimeout(() => {
                document.querySelector('.fa-bell').classList.remove('bell-ring');
            }, 500);
            
            // Show toast notification
            if (notifications.length > 0) {
                showToast(notifications[0]);
            }
        }
        lastNotificationCount = unreadCount;
    } else {
        countBadge.style.display = 'none';
    }
    
    // Update notification list
    if (notifications.length === 0) {
        notificationList.innerHTML = `
            <li class="text-center py-3 text-muted">
                <i class="fas fa-inbox fa-2x mb-2"></i>
                <p class="mb-0">No notifications</p>
            </li>
        `;
    } else {
        notificationList.innerHTML = notifications.map(notif => `
            <li class="notification-item ${notif.is_read ? '' : 'unread'}" 
                onclick="markAsRead(${notif.id}, '${notif.link || '#'}')">
                <div class="d-flex">
                    <div class="notification-icon ${notif.notification_type}">
                        <i class="fas fa-${getIconForType(notif.notification_type)}"></i>
                    </div>
                    <div class="flex-grow-1">
                        <div class="notification-title">${notif.title}</div>
                        <div class="notification-message">${notif.message}</div>
                        <div class="notification-time">${formatTime(notif.created_at)}</div>
                    </div>
                </div>
            </li>
        `).join('');
    }
}

// Get icon for notification type
function getIconForType(type) {
    const icons = {
        'info': 'info-circle',
        'success': 'check-circle',
        'warning': 'exclamation-triangle',
        'error': 'times-circle'
    };
    return icons[type] || 'bell';
}

// Format time
function formatTime(timestamp) {
    const date = new Date(timestamp);
    const now = new Date();
    const diff = Math.floor((now - date) / 1000); // seconds
    
    if (diff < 60) return 'Just now';
    if (diff < 3600) return Math.floor(diff / 60) + ' minutes ago';
    if (diff < 86400) return Math.floor(diff / 3600) + ' hours ago';
    return Math.floor(diff / 86400) + ' days ago';
}

// Mark notification as read
async function markAsRead(notificationId, link) {
    try {
        await fetch(`/api/notifications/${notificationId}/read/`, {
            method: 'POST',
            headers: {
                'X-CSRFToken': getCookie('csrftoken')
            }
        });
        fetchNotifications();
        if (link && link !== '#') {
            window.location.href = link;
        }
    } catch (error) {
        console.error('Error marking notification as read:', error);
    }
}

// Mark all as read
async function markAllAsRead() {
    try {
        await fetch('/api/notifications/mark-all-read/', {
            method: 'POST',
            headers: {
                'X-CSRFToken': getCookie('csrftoken')
            }
        });
        fetchNotifications();
    } catch (error) {
        console.error('Error marking all as read:', error);
    }
}

// Show toast notification
function showToast(notification) {
    // Create toast element
    const toast = document.createElement('div');
    toast.className = `toast-notification ${notification.notification_type}`;
    toast.innerHTML = `
        <div class="toast-icon">
            <i class="fas fa-${getIconForType(notification.notification_type)}"></i>
        </div>
        <div class="toast-content">
            <div class="toast-title">${notification.title}</div>
            <div class="toast-message">${notification.message}</div>
        </div>
        <button class="toast-close" onclick="this.parentElement.remove()">
            <i class="fas fa-times"></i>
        </button>
    `;
    
    document.body.appendChild(toast);
    
    // Auto remove after 5 seconds
    setTimeout(() => {
        toast.style.animation = 'slideOut 0.3s ease-out';
        setTimeout(() => toast.remove(), 300);
    }, 5000);
}

// Get CSRF token
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

// Initialize
document.addEventListener('DOMContentLoaded', function() {
    fetchNotifications();
    // Poll every 10 seconds
    setInterval(fetchNotifications, 10000);
});
</script>

<style>

    }
}

.toast-notification.info .toast-icon { background: #2196F3; color: white; }
